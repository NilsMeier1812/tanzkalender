<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanz-Tracker</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #F3F4F6;
            --card-bg: #FFFFFF;
            --text: #1F2937;
            --border: #E5E7EB;
            --google: #DB4437;
            --google-hover: #C53929;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .app-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .nav { display: flex; border-bottom: 1px solid var(--border); }
        .nav button {
            flex: 1; padding: 15px; background: none; border: none;
            font-size: 16px; font-weight: 600; color: #6B7280; cursor: pointer; transition: color 0.2s;
        }
        .nav button.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .nav button#nav-logout { color: #DC2626; font-size: 14px; flex: 0.5; }
        
        .view { padding: 20px; display: none; }
        .view.active { display: block; }
        h2 { margin-top: 0; }
        
        /* Formulare */
        input[type="date"], input[type="email"], input[type="password"] {
            width: 100%; padding: 10px; border: 1px solid var(--border);
            border-radius: 8px; font-size: 16px; box-sizing: border-box; font-family: inherit; margin-bottom: 15px;
        }
        .times-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .time-btn {
            padding: 15px; border: 2px solid var(--border); border-radius: 8px;
            background: transparent; font-size: 16px; cursor: pointer; transition: all 0.2s;
        }
        .time-btn:hover { border-color: #A5B4FC; }
        .time-btn.selected { border-color: var(--primary); background-color: #EEF2FF; color: var(--primary); font-weight: bold; }

        .btn-primary {
            width: 100%; padding: 15px; background-color: var(--primary); color: white;
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.2s;
            margin-bottom: 10px;
        }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-primary:disabled { background-color: #9CA3AF; cursor: not-allowed; }

        .btn-google {
            background-color: var(--google);
        }
        .btn-google:hover { background-color: var(--google-hover); }
        
        /* Kalender */
        .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .calendar-nav-btn {
            background: #E5E7EB; border: none; border-radius: 50%; width: 32px; height: 32px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold;
        }
        .calendar-nav-btn:hover { background: #D1D5DB; }
        .calendar-month { font-weight: bold; font-size: 18px; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day-header { text-align: center; font-size: 12px; font-weight: bold; color: #6B7280; padding-bottom: 5px; }
        .calendar-cell {
            aspect-ratio: 1; border: 1px solid var(--border); border-radius: 4px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; position: relative;
        }
        .calendar-cell.has-dance { background-color: #EEF2FF; border-color: var(--primary); color: var(--primary); font-weight: bold; cursor: pointer; }
        .dance-count {
            font-size: 10px; background-color: var(--primary); color: white; border-radius: 50%;
            width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; position: absolute; bottom: 2px; right: 2px;
        }
        #status-msg, #login-error { margin-top: 10px; text-align: center; font-weight: bold; min-height: 20px; }
        #status-msg { color: #059669; }
        #login-error { color: #DC2626; }
        .loading-text { grid-column: 1 / -1; text-align: center; color: #6B7280; font-size: 14px; padding: 20px 0; }
        
        /* Toggle Container */
        #main-app { display: none; }
        
        .divider { text-align: center; margin: 15px 0; color: #6B7280; font-size: 14px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="login-view" class="view active">
        <h2 style="text-align: center;">Login</h2>
        
        <button id="google-login-btn" class="btn-primary btn-google">Mit Google anmelden</button>
        
        <div class="divider">oder</div>

        <input type="email" id="login-email" placeholder="E-Mail">
        <input type="password" id="login-password" placeholder="Passwort">
        <button id="login-btn" class="btn-primary">Anmelden</button>
        
        <div id="login-error"></div>
    </div>

    <div id="main-app">
        <div class="nav">
            <button id="nav-eintragen" class="active">Eintragen</button>
            <button id="nav-kalender">Kalender</button>
            <button id="nav-logout">Logout</button>
        </div>

        <div id="view-eintragen" class="view active">
            <h2>Wann warst du tanzen?</h2>
            <div class="date-selector">
                <label for="date-input" style="display:block; margin-bottom:5px; color:#6B7280; font-size:14px;">Datum (Standard ist heute):</label>
                <input type="date" id="date-input">
            </div>
            <div id="times-container" class="times-grid"></div>
            <button id="save-btn" class="btn-primary" disabled>Zeiten Speichern</button>
            <div id="status-msg"></div>
        </div>

        <div id="view-kalender" class="view">
            <div class="calendar-header">
                <button class="calendar-nav-btn" id="prev-month">&lt;</button>
                <div class="calendar-month" id="calendar-month-label"></div>
                <button class="calendar-nav-btn" id="next-month">&gt;</button>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
            <div id="calendar-details" style="margin-top: 20px; padding: 10px; background: #F9FAFB; border-radius: 8px; display: none;">
                <h4 id="detail-date" style="margin-top:0;"></h4>
                <ul id="detail-times" style="margin-bottom:0; padding-left: 20px;"></ul>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBe3-PKYw76lcQ3RFoy7pQivl-6NtuIniI",
      authDomain: "tanzkalender-e329d.firebaseapp.com",
      projectId: "tanzkalender-e329d",
      storageBucket: "tanzkalender-e329d.firebasestorage.app",
      messagingSenderId: "539481767816",
      appId: "1:539481767816:web:ba4782fa8a0c5346ec843d",
      measurementId: "G-R2LDY6SWDZ"
    };

    let app, db, auth;
    try {
        if(Object.keys(firebaseConfig).length > 0) {
            app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app); 
        }
    } catch (e) {
        console.error("Firebase Config fehlerhaft:", e);
    }

    const timesNormal = ["14:45", "16:00", "17:15", "18:30", "19:45", "21:00"];
    const timesSunday = ["14:00", "15:15", "16:30", "18:15", "19:00", "20:15"];
    let selectedTimes = new Set();
    let currentDisplayDate = new Date();

    const dateInput = document.getElementById('date-input');
    const timesContainer = document.getElementById('times-container');
    const saveBtn = document.getElementById('save-btn');
    const statusMsg = document.getElementById('status-msg');

    const loginView = document.getElementById('login-view');
    const mainApp = document.getElementById('main-app');
    const loginBtn = document.getElementById('login-btn');
    const googleLoginBtn = document.getElementById('google-login-btn');
    const logoutBtn = document.getElementById('nav-logout');
    const loginError = document.getElementById('login-error');

    if(auth) {
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginView.classList.remove('active');
                mainApp.style.display = 'block';
                initApp(); 
            } else {
                mainApp.style.display = 'none';
                loginView.classList.add('active');
            }
        });
    }

    // Google Login Logik
    const provider = new GoogleAuthProvider();
    googleLoginBtn.addEventListener('click', async () => {
        loginError.textContent = "";
        googleLoginBtn.disabled = true;
        try {
            await signInWithPopup(auth, provider);
        } catch (error) {
            loginError.textContent = "Fehler beim Google-Login.";
            console.error(error);
        } finally {
            googleLoginBtn.disabled = false;
        }
    });

    // Email/Password Login Logik
    loginBtn.addEventListener('click', async () => {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        loginError.textContent = "";
        loginBtn.disabled = true;

        try {
            await signInWithEmailAndPassword(auth, email, password);
        } catch (error) {
            loginError.textContent = "Fehler beim Login. Zugangsdaten prüfen.";
        } finally {
            loginBtn.disabled = false;
        }
    });

    logoutBtn.addEventListener('click', () => {
        signOut(auth);
    });

    function initApp() {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        dateInput.value = `${yyyy}-${mm}-${dd}`;
        renderTimeButtons();

        document.getElementById('prev-month').onclick = () => changeMonth(-1);
        document.getElementById('next-month').onclick = () => changeMonth(1);
    }

    function changeMonth(delta) {
        currentDisplayDate.setMonth(currentDisplayDate.getMonth() + delta);
        loadCalendar();
    }

    async function renderTimeButtons() {
        timesContainer.innerHTML = '<div class="loading-text">Lade Einträge...</div>';
        saveBtn.disabled = true;
        selectedTimes.clear();

        const dateStr = dateInput.value;
        const selectedDate = new Date(dateStr);
        const dayOfWeek = selectedDate.getDay();
        const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;

        let currentTimes = dayOfWeek === 0 ? [...timesSunday] : [...timesNormal];
        if (isWeekend) currentTimes.push("Party");

        if (db) {
            try {
                const docRef = doc(db, "danceSessions", dateStr);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists() && docSnap.data().times) {
                    docSnap.data().times.forEach(time => selectedTimes.add(time));
                }
            } catch (e) {
                console.error("Lesefehler:", e);
            }
        }

        timesContainer.innerHTML = '';
        currentTimes.forEach(time => {
            const btn = document.createElement('button');
            btn.className = 'time-btn';
            if (selectedTimes.has(time)) btn.classList.add('selected');
            btn.textContent = time;
            btn.onclick = () => toggleTime(time, btn);
            timesContainer.appendChild(btn);
        });

        saveBtn.disabled = false;
    }

    function toggleTime(time, btnElement) {
        if (selectedTimes.has(time)) {
            selectedTimes.delete(time);
            btnElement.classList.remove('selected');
        } else {
            selectedTimes.add(time);
            btnElement.classList.add('selected');
        }
    }

    dateInput.addEventListener('change', renderTimeButtons);

    saveBtn.addEventListener('click', async () => {
        if (!db) return;
        const dateStr = dateInput.value;
        const timesArray = Array.from(selectedTimes);
        saveBtn.disabled = true;
        saveBtn.textContent = "Speichere...";

        try {
            await setDoc(doc(db, "danceSessions", dateStr), { date: dateStr, times: timesArray }, { merge: true });
            statusMsg.textContent = "Erfolgreich gespeichert!";
            setTimeout(() => { statusMsg.textContent = ""; }, 3000);
            renderTimeButtons();
        } catch (e) {
            alert("Berechtigungsfehler beim Speichern. Stimmen deine Firestore-Regeln?");
        } finally {
            saveBtn.textContent = "Zeiten Speichern";
        }
    });

    document.getElementById('nav-eintragen').addEventListener('click', (e) => switchTab('eintragen', e.target));
    document.getElementById('nav-kalender').addEventListener('click', (e) => switchTab('kalender', e.target));

    function switchTab(tabId, btnElement) {
        document.querySelectorAll('.nav button:not(#nav-logout)').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.view:not(#login-view)').forEach(v => v.classList.remove('active'));
        btnElement.classList.add('active');
        document.getElementById(`view-${tabId}`).classList.add('active');

        if (tabId === 'kalender') {
            currentDisplayDate = new Date();
            loadCalendar();
        }
        else if (tabId === 'eintragen') renderTimeButtons();
    }

    async function loadCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '<div class="loading-text">Lade Kalender...</div>';
        document.getElementById('calendar-details').style.display = 'none';

        if (!db) return;

        const sessionsData = {};
        try {
            const querySnapshot = await getDocs(collection(db, "danceSessions"));
            querySnapshot.forEach((doc) => { sessionsData[doc.id] = doc.data().times; });
        } catch (e) { 
            grid.innerHTML = '<div class="loading-text" style="color:red;">Fehler beim Laden (Berechtigung?)</div>';
            return; 
        }

        const year = currentDisplayDate.getFullYear();
        const month = currentDisplayDate.getMonth();
        
        const monthNames = ["Januar", "Februar", "März", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Dezember"];
        document.getElementById('calendar-month-label').textContent = `${monthNames[month]} ${year}`;

        grid.innerHTML = '';
        const days = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];
        days.forEach(d => {
            const div = document.createElement('div');
            div.className = 'day-header';
            div.textContent = d;
            grid.appendChild(div);
        });

        let firstDay = new Date(year, month, 1).getDay();
        firstDay = firstDay === 0 ? 6 : firstDay - 1; 

        const daysInMonth = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) {
            grid.appendChild(document.createElement('div'));
        }

        for (let i = 1; i <= daysInMonth; i++) {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell';
            cell.textContent = i;

            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;

            if (sessionsData[dateStr] && sessionsData[dateStr].length > 0) {
                let dailyCount = 0;
                sessionsData[dateStr].forEach(time => {
                    dailyCount += (time === "Party" ? 2 : 1);
                });

                if (dailyCount > 0) {
                    cell.classList.add('has-dance');
                    const badge = document.createElement('div');
                    badge.className = 'dance-count';
                    badge.textContent = dailyCount;
                    cell.appendChild(badge);
                    cell.onclick = () => showDetails(dateStr, sessionsData[dateStr]);
                }
            }
            grid.appendChild(cell);
        }
    }

    function showDetails(dateStr, times) {
        const detailsBox = document.getElementById('calendar-details');
        const title = document.getElementById('detail-date');
        const list = document.getElementById('detail-times');
        const dateObj = new Date(dateStr);
        title.textContent = `Getanzt am: ${dateObj.toLocaleDateString('de-DE')}`;
        list.innerHTML = '';
        times.sort().forEach(time => {
            const li = document.createElement('li');
            li.innerHTML = (time === "Party" ? "<strong>Tanzparty</strong> (zählt 2x)" : time + " Uhr");
            list.appendChild(li);
        });
        detailsBox.style.display = 'block';
    }
</script>
</body>
</html>
